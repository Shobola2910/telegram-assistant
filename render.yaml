services:
  - type: worker
    name: telegram-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: YOUR_TELEGRAM_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Tashkent
      - key: CREDENTIALS_JSON
        sync: false
      - key: TOKEN_JSON
        sync: false
