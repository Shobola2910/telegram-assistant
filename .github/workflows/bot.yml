name: Telegram Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Har 5 daqiqada ishga tushadi
  workflow_dispatch:        # Qo'lda ham ishga tushirish mumkin

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4      # 4 daqiqada to'xtatadi (5 dan oldin)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: |
          echo "${{ secrets.CREDENTIALS_JSON }}" | base64 -d > credentials.json
          echo "${{ secrets.TOKEN_JSON }}" | base64 -d > token.json

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          YOUR_TELEGRAM_ID: ${{ secrets.YOUR_TELEGRAM_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TIMEZONE: Asia/Tashkent
        run: python main.py
